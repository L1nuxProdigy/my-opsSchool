---
- name: install httpd, replace html, add line to hosts file
  hosts: webserver
  remote_user: ec2-user
  become: yes
  vars_files: ['credentials.yml','hosts.yml']
  
  tasks: 
  - name: install httpd
    yum: name=httpd state=present
    
  - name: replace html
    template: src=/home/ec2-user/my-opsSchool/ansible/playbooks/firstSession_2018_12_26/index_template dest=/var/www/html
    
  - name: add text to /etc/hosts
    lineinfile:
      path: /etc/hosts
      line: '{{node1_ip}}'
  