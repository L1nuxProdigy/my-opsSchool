---
- name: create user, add repo, install and configure ntp
  hosts: node
  remote_user: ec2-user
  become: yes
  vars_files: ['credentials.yml']
  
  tasks:
  - name: create opsschool user
    user: name=opsschool password={{user_default_password}}
    
  - name: install epel repo
    yum: name=https://dl.fedoraproject.org/pub/epel/epel-release-latest-7.noarch.rpm state=present
    
  - name: install ntp
    yum: name=ntp state=present
    
  - name: replace ntp.conf
    template: src=/home/ec2-user/my-opsSchool/ansible/playbooks/firstSession_2018_12_26/ntp_template dest=/etc/ntp.conf
    
  - name: restart ntp service
    service: name=ntp state=restarted
  